spring:
  application:
    name: sistema-estoque-silas
  
  # Configuração do Banco de Dados H2 (In-Memory para execução rápida)
  datasource:
    url: jdbc:h2:mem:estoquedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # Configuração JPA / Hibernate
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false # Mantenha false para logs limpos; mude para true se precisar debugar
    properties:
      hibernate:
        format_sql: true

  # Configuração do Jackson para serialização JSON
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

# Configurações do Servidor
server:
  port: 8080
  servlet:
    context-path: /api/v1